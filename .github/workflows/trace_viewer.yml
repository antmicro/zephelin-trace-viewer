name: zephelin_trace_viewer
run-name: Zephelin Trace Viewer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Prepare dependencies
        run: |
          corepack enable
          yarn
      - name: Lint code
        run: |
          yarn lint
          git diff --exit-code

  build-and-deploy-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Prepare dependencies
        run: |
          corepack enable
          yarn
      - name: Build Zephelin Trace Viewer
        run: yarn build
      - name: Build Zephelin Trace Viewer in single-html mode
        run: yarn build-singlefile --outDir dist/single-html
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zephelin-trace-viewer
          path: dist
      - name: Deploy to Github Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && github.repository == 'antmicro/zephelin-trace-viewer'
        run: |
          cd dist
          touch .nojekyll
          git init
          cp ../.git/config ./.git/config
          git add .
          git config --local user.email "push@gha"
          git config --local user.name "GHA"
          git commit -am "update ${{ github.sha }}"
          git push -u origin +HEAD:gh-pages
          rm -rf .git

  build-and-deploy-vscode-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Prepare dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          corepack enable
          yarn
      - name: Update package version
        run: |
          VERSION=$(git describe | sed 's|v\([^-]\+\)-\([[:digit:]]\+\).*|\1.\2|')
          cp extension/package.json temp.json
          jq --tab ".version = \"${VERSION}\"" temp.json > extension/package.json
          rm temp.json
      - name: Build VSCode Extension
        run: |
          yarn build:vsix
      - name: Publish VSCode Extension
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && github.repository == 'antmicro/zephelin-trace-viewer'
        run: |
          yarn publish:vsix -p ${{ secrets.VSC_MARKETPLACE_TOKEN }}
      - name: Upload VSIX package
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: vsix-package
          path: extension/*.vsix
